      supports_class_c:
        type: boolean
        description: 'Whether the device supports class C.

          Copied on creation from template identified by version_ids, if any or from the home Network Server device profile,
          if any.'
      lorawan_version:
        $ref: '#/definitions/v3MACVersion'
        description: 'LoRaWAN MAC version. Stored in Network Server.

          Copied on creation from template identified by version_ids, if any or from the home Network Server device profile,
