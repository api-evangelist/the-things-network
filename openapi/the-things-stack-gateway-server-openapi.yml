      - name: body
        in: body
        required: true
        schema:
          $ref: '#/definitions/v3GatewayRegistryUpdateBody'
      tags:
      - GatewayRegistry
  /gateways/{gateway_ids.gateway_id}:
    get:
      summary: 'Get the gateway with the given identifiers, selecting the fields specified

