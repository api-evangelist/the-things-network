    default: DOWNLINK_PATH_CONSTRAINT_NONE
    description: " - DOWNLINK_PATH_CONSTRAINT_NONE: Indicates that the gateway can be selected for downlink without constraints\
      \ by the Network Server.\n - DOWNLINK_PATH_CONSTRAINT_PREFER_OTHER: Indicates that the gateway can be selected for downlink\
      \ only if no other or better gateway can be selected.\n - DOWNLINK_PATH_CONSTRAINT_NEVER: Indicates that this gateway\
      \ will never be selected for downlink, even if that results in no available downlink path."
  v3Gateway:
    type: object
    properties:
      ids:
        $ref: '#/definitions/lorawanv3GatewayIdentifiers'
        description: The identifiers of the gateway. These are public and can be seen by any authenticated user in the network.
      created_at:
        type: string
        format: date-time
        description: When the gateway was created. This information is public and can be seen by any authenticated user in
          the network.
      updated_at:
        type: string
        format: date-time
        description: When the gateway was last updated. This information is public and can be seen by any authenticated user
          in the network.
      deleted_at:
        type: string
        format: date-time
        description: When the gateway was deleted. This information is public and can be seen by any authenticated user in
          the network.
      name:
        type: string
        description: The name of the gateway. This information is public and can be seen by any authenticated user in the
          network.
      description:
        type: string
        description: A description for the gateway. This information is public and can be seen by any authenticated user in
          the network.
      attributes:
        type: object
        additionalProperties:
          type: string
        description: Key-value attributes for this gateway. Typically used for organizing gateways or for storing integration-specific
          data.
      contact_info:
        type: array
        items:
          type: object
          $ref: '#/definitions/v3ContactInfo'
        description: 'Contact information for this gateway. Typically used to indicate who to contact with technical/security
          questions about the gateway.

          This field is deprecated. Use administrative_contact and technical_contact instead.'
      administrative_contact:
        $ref: '#/definitions/v3OrganizationOrUserIdentifiers'
      technical_contact:
        $ref: '#/definitions/v3OrganizationOrUserIdentifiers'
      version_ids:
        $ref: '#/definitions/v3GatewayVersionIdentifiers'
      gateway_server_address:
        type: string
        description: 'The address of the Gateway Server to connect to.

          This information is public and can be seen by any authenticated user in the network if status_public is true.

          The typical format of the address is "scheme://host:port". The scheme is optional. If the port is omitted,

          the normal port inference (with DNS lookup, otherwise defaults) is used.

          The connection shall be established with transport layer security (TLS).

          Custom certificate authorities may be configured out-of-band.'
      auto_update:
        type: boolean
      update_channel:
        type: string
      frequency_plan_id:
        type: string
        description: 'Frequency plan ID of the gateway.

          This information is public and can be seen by any authenticated user in the network.

          DEPRECATED: use frequency_plan_ids.

          This equals the first element of the frequency_plan_ids field.'
      frequency_plan_ids:
        type: array
        items:
          type: string
        description: 'Frequency plan IDs of the gateway.

          This information is public and can be seen by any authenticated user in the network.

          The first element equals the frequency_plan_id field.'
      antennas:
        type: array
        items:
          type: object
          $ref: '#/definitions/v3GatewayAntenna'
        description: Antennas of the gateway. Location information of the antennas is public and can be seen by any authenticated
          user in the network if location_public=true.
      status_public:
        type: boolean
        description: The status of this gateway may be publicly displayed.
      location_public:
        type: boolean
        description: The location of this gateway may be publicly displayed.
      schedule_downlink_late:
        type: boolean
        description: 'Enable server-side buffering of downlink messages. This is recommended for gateways using the Semtech
          UDP Packet

          Forwarder v2.x or older, as it does not feature a just-in-time queue. If enabled, the Gateway Server schedules the

          downlink message late to the gateway so that it does not overwrite previously scheduled downlink messages that have

          not been transmitted yet.'
      enforce_duty_cycle:
        type: boolean
        description: 'Enforcing gateway duty cycle is recommended for all gateways to respect spectrum regulations. Disable
          enforcing the

          duty cycle only in controlled research and development environments.'
      downlink_path_constraint:
        $ref: '#/definitions/v3DownlinkPathConstraint'
      schedule_anytime_delay:
        type: string
        description: Adjust the time that GS schedules class C messages in advance. This is useful for gateways that have
          a known high latency backhaul, like 3G and satellite.
      update_location_from_status:
        type: boolean
        description: Update the location of this gateway from status messages. This only works for gateways connecting with
          authentication; gateways connected over UDP are not supported.
      lbs_lns_secret:
        $ref: '#/definitions/v3Secret'
        description: 'The LoRa Basics Station LNS secret.

          This is either an auth token (such as an API Key) or a TLS private certificate.

          Requires the RIGHT_GATEWAY_READ_SECRETS for reading and RIGHT_GATEWAY_WRITE_SECRETS for updating this value.'
      claim_authentication_code:
        $ref: '#/definitions/v3GatewayClaimAuthenticationCode'
        description: 'The authentication code for gateway claiming.

          Requires the RIGHT_GATEWAY_READ_SECRETS for reading and RIGHT_GATEWAY_WRITE_SECRETS for updating this value.

          The entire field must be used in RPCs since sub-fields are validated wrt to each other. Direct selection/update
          of sub-fields only are not allowed.

          Use the top level field mask `claim_authentication_code` even when updating single fields.'
      target_cups_uri:
        type: string
        description: 'CUPS URI for LoRa Basics Station CUPS redirection.

          The CUPS Trust field will be automatically fetched from the cert chain presented by the target server.'
      target_cups_key:
        $ref: '#/definitions/v3Secret'
        description: 'CUPS Key for LoRa Basics Station CUPS redirection.

          If redirecting to another instance of TTS, use the CUPS API Key for the gateway on the target instance.

          Requires the RIGHT_GATEWAY_READ_SECRETS for reading and RIGHT_GATEWAY_WRITE_SECRETS for updating this value.'
      require_authenticated_connection:
        type: boolean
        description: Require an authenticated gateway connection. This prevents the gateway from using the UDP protocol and
          requires authentication when using other protocols.
      lrfhss:
        $ref: '#/definitions/GatewayLRFHSS'
      disable_packet_broker_forwarding:
        type: boolean
    description: Gateway is the message that defines a gateway on the network.
