  v3MACCommandIdentifier:
    type: string
    enum:
    - CID_RFU_0
    - CID_RESET
    - CID_LINK_CHECK
    - CID_LINK_ADR
    - CID_DUTY_CYCLE
    - CID_RX_PARAM_SETUP
    - CID_DEV_STATUS
    - CID_NEW_CHANNEL
    - CID_RX_TIMING_SETUP
    - CID_TX_PARAM_SETUP
    - CID_DL_CHANNEL
    - CID_REKEY
    - CID_ADR_PARAM_SETUP
    - CID_DEVICE_TIME
    - CID_FORCE_REJOIN
    - CID_REJOIN_PARAM_SETUP
    - CID_PING_SLOT_INFO
    - CID_PING_SLOT_CHANNEL
    - CID_BEACON_TIMING
    - CID_BEACON_FREQ
    - CID_DEVICE_MODE
    - CID_RELAY_CONF
    - CID_RELAY_END_DEVICE_CONF
    - CID_RELAY_FILTER_LIST
    - CID_RELAY_UPDATE_UPLINK_LIST
    - CID_RELAY_CTRL_UPLINK_LIST
    - CID_RELAY_CONFIGURE_FWD_LIMIT
    - CID_RELAY_NOTIFY_NEW_END_DEVICE
    default: CID_RFU_0
    title: '- CID_BEACON_TIMING: Deprecated'
  v3MACParameters:
    type: object
    properties:
      max_eirp:
        type: number
        format: float
        description: Maximum EIRP (dBm).
      adr_data_rate_index:
        $ref: '#/definitions/v3DataRateIndex'
        description: 'ADR: data rate index to use.'
      adr_tx_power_index:
        type: integer
        format: int64
        description: 'ADR: transmission power index to use.'
      adr_nb_trans:
        type: integer
        format: int64
        description: 'ADR: number of retransmissions.'
      adr_ack_limit:
        type: integer
        format: int64
        description: 'ADR: number of messages to wait before setting ADRAckReq.

          This field is deprecated, use adr_ack_limit_exponent instead.'
      adr_ack_delay:
        type: integer
        format: int64
        description: 'ADR: number of messages to wait after setting ADRAckReq and before changing TxPower or DataRate.

          This field is deprecated, use adr_ack_delay_exponent instead.'
      rx1_delay:
        $ref: '#/definitions/v3RxDelay'
        description: Rx1 delay (Rx2 delay is Rx1 delay + 1 second).
      rx1_data_rate_offset:
        $ref: '#/definitions/v3DataRateOffset'
        description: Data rate offset for Rx1.
      rx2_data_rate_index:
        $ref: '#/definitions/v3DataRateIndex'
        description: Data rate index for Rx2.
      rx2_frequency:
        type: string
        format: uint64
        description: Frequency for Rx2 (Hz).
      max_duty_cycle:
        $ref: '#/definitions/v3AggregatedDutyCycle'
        description: Maximum uplink duty cycle (of all channels).
      rejoin_time_periodicity:
        $ref: '#/definitions/v3RejoinTimeExponent'
        description: Time within which a rejoin-request must be sent.
      rejoin_count_periodicity:
        $ref: '#/definitions/v3RejoinCountExponent'
        description: Message count within which a rejoin-request must be sent.
      ping_slot_frequency:
        type: string
        format: uint64
        description: Frequency of the class B ping slot (Hz).
      ping_slot_data_rate_index:
        $ref: '#/definitions/v3DataRateIndex'
        description: 'Data rate index of the class B ping slot.

          This field is deprecated, use ping_slot_data_rate_index_value instead.'
      beacon_frequency:
        type: string
        format: uint64
        description: Frequency of the class B beacon (Hz).
      channels:
        type: array
        items:
          type: object
          $ref: '#/definitions/v3MACParametersChannel'
        description: Configured uplink channels and optionally Rx1 frequency.
      uplink_dwell_time:
        $ref: '#/definitions/lorawanv3BoolValue'
        description: 'Whether uplink dwell time is set (400ms).

          If unset, then the value is either unknown or irrelevant(Network Server cannot modify it).'
      downlink_dwell_time:
        $ref: '#/definitions/lorawanv3BoolValue'
        description: 'Whether downlink dwell time is set (400ms).

          If unset, then the value is either unknown or irrelevant(Network Server cannot modify it).'
      adr_ack_limit_exponent:
        $ref: '#/definitions/v3ADRAckLimitExponentValue'
        description: 'ADR: number of messages to wait before setting ADRAckReq.'
      adr_ack_delay_exponent:
        $ref: '#/definitions/v3ADRAckDelayExponentValue'
        description: 'ADR: number of messages to wait after setting ADRAckReq and before changing TxPower or DataRate.'
      ping_slot_data_rate_index_value:
        $ref: '#/definitions/v3DataRateIndexValue'
        description: Data rate index of the class B ping slot.
      relay:
        $ref: '#/definitions/lorawanv3RelayParameters'
        description: Relay parameters.
    description: 'MACParameters represent the parameters of the device''s MAC layer (active or desired).

      This is used internally by the Network Server.'
  v3MACParametersChannel:
    type: object
    properties:
      uplink_frequency:
        type: string
        format: uint64
        description: Uplink frequency of the channel (Hz).
      downlink_frequency:
        type: string
        format: uint64
        description: Downlink frequency of the channel (Hz).
      min_data_rate_index:
        $ref: '#/definitions/v3DataRateIndex'
        description: Index of the minimum data rate for uplink.
      max_data_rate_index:
        $ref: '#/definitions/v3DataRateIndex'
        description: Index of the maximum data rate for uplink.
      enable_uplink:
        type: boolean
        description: Channel can be used by device for uplink.
  v3MACSettings:
    type: object
    properties:
      class_b_timeout:
        type: string
        description: 'Maximum delay for the device to answer a MAC request or a confirmed downlink frame.

          If unset, the default value from Network Server configuration will be used.'
      ping_slot_periodicity:
        $ref: '#/definitions/v3PingSlotPeriodValue'
        description: 'Periodicity of the class B ping slot.

          If unset, the default value from Network Server configuration will be used.'
      ping_slot_data_rate_index:
        $ref: '#/definitions/v3DataRateIndexValue'
        description: 'Data rate index of the class B ping slot.

          If unset, the default value from Network Server configuration will be used.'
      ping_slot_frequency:
        $ref: '#/definitions/v3ZeroableFrequencyValue'
        description: 'Frequency of the class B ping slot (Hz).

          If unset, the default value from Network Server configuration will be used.'
      beacon_frequency:
        $ref: '#/definitions/v3ZeroableFrequencyValue'
        description: 'Frequency of the class B beacon (Hz).

          If unset, the default value from Network Server configuration will be used.'
      class_c_timeout:
        type: string
        description: 'Maximum delay for the device to answer a MAC request or a confirmed downlink frame.

          If unset, the default value from Network Server configuration will be used.'
      rx1_delay:
        $ref: '#/definitions/v3RxDelayValue'
        description: 'Class A Rx1 delay.

          If unset, the default value from Network Server configuration or regional parameters specification will be used.'
      rx1_data_rate_offset:
        $ref: '#/definitions/v3DataRateOffsetValue'
        description: 'Rx1 data rate offset.

          If unset, the default value from Network Server configuration will be used.'
      rx2_data_rate_index:
        $ref: '#/definitions/v3DataRateIndexValue'
        description: 'Data rate index for Rx2.

          If unset, the default value from Network Server configuration or regional parameters specification will be used.'
      rx2_frequency:
        $ref: '#/definitions/v3FrequencyValue'
        description: 'Frequency for Rx2 (Hz).

          If unset, the default value from Network Server configuration or regional parameters specification will be used.'
      factory_preset_frequencies:
        type: array
        items:
          type: string
          format: uint64
        description: 'List of factory-preset frequencies.

          If unset, the default value from Network Server configuration or regional parameters specification will be used.'
      max_duty_cycle:
        $ref: '#/definitions/v3AggregatedDutyCycleValue'
        description: Maximum uplink duty cycle (of all channels).
      supports_32_bit_f_cnt:
        $ref: '#/definitions/lorawanv3BoolValue'
        description: 'Whether the device supports 32-bit frame counters.

          If unset, the default value from Network Server configuration will be used.'
      use_adr:
        $ref: '#/definitions/lorawanv3BoolValue'
        description: 'Whether the Network Server should use ADR for the device.

          This field is deprecated, use adr_settings instead.'
      adr_margin:
        type: number
        format: float
        description: 'The ADR margin (dB) tells the network server how much margin it should add in ADR requests.

          A bigger margin is less efficient, but gives a better chance of successful reception.

          This field is deprecated, use adr_settings.dynamic.margin instead.'
      resets_f_cnt:
        $ref: '#/definitions/lorawanv3BoolValue'
        description: 'Whether the device resets the frame counters (not LoRaWAN compliant).

          If unset, the default value from Network Server configuration will be used.'
      status_time_periodicity:
        type: string
        description: 'The interval after which a DevStatusReq MACCommand shall be sent.

          If unset, the default value from Network Server configuration will be used.'
      status_count_periodicity:
        type: integer
        format: int64
        description: 'Number of uplink messages after which a DevStatusReq MACCommand shall be sent.

          If unset, the default value from Network Server configuration will be used.'
      desired_rx1_delay:
        $ref: '#/definitions/v3RxDelayValue'
        description: 'The Rx1 delay Network Server should configure device to use via MAC commands or Join-Accept.

          If unset, the default value from Network Server configuration or regional parameters specification will be used.'
      desired_rx1_data_rate_offset:
        $ref: '#/definitions/v3DataRateOffsetValue'
        description: 'The Rx1 data rate offset Network Server should configure device to use via MAC commands or Join-Accept.

          If unset, the default value from Network Server configuration will be used.'
      desired_rx2_data_rate_index:
        $ref: '#/definitions/v3DataRateIndexValue'
        description: 'The Rx2 data rate index Network Server should configure device to use via MAC commands or Join-Accept.

          If unset, the default value from frequency plan, Network Server configuration or regional parameters specification
          will be used.'
      desired_rx2_frequency:
        $ref: '#/definitions/v3FrequencyValue'
        description: 'The Rx2 frequency index Network Server should configure device to use via MAC commands.

          If unset, the default value from frequency plan, Network Server configuration or regional parameters specification
          will be used.'
      desired_max_duty_cycle:
        $ref: '#/definitions/v3AggregatedDutyCycleValue'
        description: 'The maximum uplink duty cycle (of all channels) Network Server should configure device to use via MAC
          commands.

          If unset, the default value from Network Server configuration will be used.'
      desired_adr_ack_limit_exponent:
        $ref: '#/definitions/v3ADRAckLimitExponentValue'
        description: 'The ADR ACK limit Network Server should configure device to use via MAC commands.

          If unset, the default value from Network Server configuration or regional parameters specification will be used.'
      desired_adr_ack_delay_exponent:
        $ref: '#/definitions/v3ADRAckDelayExponentValue'
        description: 'The ADR ACK delay Network Server should configure device to use via MAC commands.

          If unset, the default value from Network Server configuration or regional parameters specification will be used.'
      desired_ping_slot_data_rate_index:
        $ref: '#/definitions/v3DataRateIndexValue'
        description: 'The data rate index of the class B ping slot Network Server should configure device to use via MAC commands.

          If unset, the default value from Network Server configuration will be used.'
      desired_ping_slot_frequency:
        $ref: '#/definitions/v3ZeroableFrequencyValue'
        description: 'The frequency of the class B ping slot (Hz) Network Server should configure device to use via MAC commands.

          If unset, the default value from Network Server configuration or regional parameters specification will be used.'
      desired_beacon_frequency:
        $ref: '#/definitions/v3ZeroableFrequencyValue'
        description: 'The frequency of the class B beacon (Hz) Network Server should configure device to use via MAC commands.

          If unset, the default value from Network Server configuration will be used.'
      desired_max_eirp:
        $ref: '#/definitions/v3DeviceEIRPValue'
        description: 'Maximum EIRP (dBm).

          If unset, the default value from regional parameters specification will be used.'
      class_b_c_downlink_interval:
        type: string
        description: The minimum duration passed before a network-initiated(e.g. Class B or C) downlink following an arbitrary
          downlink.
      uplink_dwell_time:
        $ref: '#/definitions/lorawanv3BoolValue'
        description: 'Whether uplink dwell time is set (400ms).

          If unset, the default value from Network Server configuration or regional parameters specification will be used.'
      downlink_dwell_time:
        $ref: '#/definitions/lorawanv3BoolValue'
        description: 'Whether downlink dwell time is set (400ms).

          If unset, the default value from Network Server configuration or regional parameters specification will be used.'
      adr:
        $ref: '#/definitions/v3ADRSettings'
        description: 'Adaptive Data Rate settings.

          If unset, the default value from Network Server configuration or regional parameters specification will be used.'
      schedule_downlinks:
        $ref: '#/definitions/lorawanv3BoolValue'
        description: 'Whether or not downlink messages should be scheduled.

          This option can be used in order to disable any downlink interaction with the end device. It will affect all types

          of downlink messages: data and MAC downlinks, and join accepts.'
      relay:
        $ref: '#/definitions/v3RelaySettings'
        description: 'The relay settings the end device is using.

          If unset, the default value from Network Server configuration or regional parameters specification will be used.'
      desired_relay:
        $ref: '#/definitions/v3RelaySettings'
        description: 'The relay settings the Network Server should configure device to use via MAC commands.

          If unset, the default value from Network Server configuration or regional parameters specification will be used.'
  v3MACSettingsProfileIdentifiers:
    type: object
    properties:
      application_ids:
        $ref: '#/definitions/v3ApplicationIdentifiers'
        description: Application IDs.
      profile_id:
        type: string
        description: Profile ID.
  v3MACState:
    type: object
    properties:
      current_parameters:
        $ref: '#/definitions/v3MACParameters'
        description: Current LoRaWAN MAC parameters.
      desired_parameters:
        $ref: '#/definitions/v3MACParameters'
        description: Desired LoRaWAN MAC parameters.
      device_class:
        $ref: '#/definitions/v3Class'
        title: 'Currently active LoRaWAN device class

          - Device class is A by default

          - If device sets ClassB bit in uplink, this will be set to B

          - If device sent DeviceModeInd MAC message, this will be set to that value'
      lorawan_version:
        $ref: '#/definitions/v3MACVersion'
        description: LoRaWAN MAC version.
      last_confirmed_downlink_at:
        type: string
        format: date-time
        description: Time when the last confirmed downlink message or MAC command was scheduled.
      last_dev_status_f_cnt_up:
        type: integer
        format: int64
        description: Frame counter value of last uplink containing DevStatusAns.
      ping_slot_periodicity:
        $ref: '#/definitions/v3PingSlotPeriodValue'
        description: Periodicity of the class B ping slot.
      pending_application_downlink:
        $ref: '#/definitions/v3ApplicationDownlink'
        description: A confirmed application downlink, for which an acknowledgment is expected to arrive.
      queued_responses:
        type: array
        items:
          type: object
          $ref: '#/definitions/v3MACCommand'
        description: 'Queued MAC responses.

          Regenerated on each uplink.'
      pending_requests:
        type: array
        items:
          type: object
          $ref: '#/definitions/v3MACCommand'
        description: 'Pending MAC requests(i.e. sent requests, for which no response has been received yet).

          Regenerated on each downlink.'
      queued_join_accept:
        $ref: '#/definitions/MACStateJoinAccept'
        description: 'Queued join-accept.

          Set each time a (re-)join request accept is received from Join Server and removed each time a downlink is scheduled.'
      pending_join_request:
        $ref: '#/definitions/v3MACStateJoinRequest'
        description: 'Pending join request.

          Set each time a join-accept is scheduled and removed each time an uplink is received from the device.'
      rx_windows_available:
        type: boolean
        description: 'Whether or not Rx windows are expected to be open.

          Set to true every time an uplink is received.

          Set to false every time a successful downlink scheduling attempt is made.'
      recent_uplinks:
        type: array
        items:
          type: object
          $ref: '#/definitions/v3MACStateUplinkMessage'
        description: 'Recent data uplink messages sorted by time.

          The number of messages stored may depend on configuration.'
      recent_downlinks:
        type: array
        items:
          type: object
          $ref: '#/definitions/v3MACStateDownlinkMessage'
        description: 'Recent data downlink messages sorted by time.

          The number of messages stored may depend on configuration.'
      last_network_initiated_downlink_at:
        type: string
        format: date-time
        description: Time when the last network-initiated downlink message was scheduled.
      rejected_adr_data_rate_indexes:
        type: array
        items:
          $ref: '#/definitions/v3DataRateIndex'
        description: 'ADR Data rate index values rejected by the device.

          Reset each time `current_parameters.channels` change.

          Elements are sorted in ascending order.'
      rejected_adr_tx_power_indexes:
        type: array
        items:
          type: integer
          format: int64
        description: 'ADR TX output power index values rejected by the device.

          Elements are sorted in ascending order.'
      rejected_frequencies:
        type: array
        items:
          type: string
          format: uint64
        description: Frequencies rejected by the device.
      last_downlink_at:
        type: string
        format: date-time
        description: Time when the last downlink message was scheduled.
      rejected_data_rate_ranges:
        type: object
        additionalProperties:
          $ref: '#/definitions/MACStateDataRateRanges'
        description: Data rate ranges rejected by the device per frequency.
      last_adr_change_f_cnt_up:
        type: integer
        format: int64
        description: Frame counter of uplink, which confirmed the last ADR parameter change.
      recent_mac_command_identifiers:
        type: array
        items:
          $ref: '#/definitions/v3MACCommandIdentifier'
        description: 'MAC command identifiers sent by the end device in the last received uplink.

          The Network Server may choose to store only certain types of MAC

          command identifiers in the underlying implementation.'
      pending_relay_downlink:
        $ref: '#/definitions/v3RelayForwardDownlinkReq'
        description: 'Pending relay downlink contents.

          The pending downlink will be scheduled to the relay in either Rx1 or Rx2.

          The pending downlink will be cleared after the scheduling attempt.'
    description: 'MACState represents the state of MAC layer of the device.

      MACState is reset on each join for OTAA or ResetInd for ABP devices.

      This is used internally by the Network Server.'
  v3MACStateDownlinkMessage:
    type: object
    properties:
      payload:
        $ref: '#/definitions/MACStateDownlinkMessageMessage'
      correlation_ids:
        type: array
        items:
          type: string
    description: 'A minimal DownlinkMessage definition which is binary compatible with the top level DownlinkMessage message.

      Used for type safe recent downlink storage.'
  v3MACStateJoinRequest:
    type: object
    properties:
      downlink_settings:
        $ref: '#/definitions/v3DLSettings'
      rx_delay:
        $ref: '#/definitions/v3RxDelay'
      cf_list:
        $ref: '#/definitions/v3CFList'
  v3MACStateUplinkMessage:
    type: object
    properties:
      payload:
        $ref: '#/definitions/lorawanv3Message'
      settings:
        $ref: '#/definitions/MACStateUplinkMessageTxSettings'
      rx_metadata:
        type: array
        items:
          type: object
          $ref: '#/definitions/MACStateUplinkMessageRxMetadata'
      received_at:
        type: string
        format: date-time
      correlation_ids:
        type: array
        items:
          type: string
      device_channel_index:
        type: integer
        format: int64
    description: 'A minimal UplinkMessage definition which is binary compatible with the top level UplinkMessage message.

      Used for type safe recent uplink storage.'
  v3MACVersion:
    type: string
    enum:
    - MAC_UNKNOWN
    - MAC_V1_0
    - MAC_V1_0_1
    - MAC_V1_0_2
    - MAC_V1_1
    - MAC_V1_0_3
    - MAC_V1_0_4
    default: MAC_UNKNOWN
  v3MType:
    type: string
    enum:
    - JOIN_REQUEST
    - JOIN_ACCEPT
    - UNCONFIRMED_UP
    - UNCONFIRMED_DOWN
    - CONFIRMED_UP
    - CONFIRMED_DOWN
    - REJOIN_REQUEST
    - PROPRIETARY
    default: JOIN_REQUEST
  v3Major:
    type: string
    enum:
    - LORAWAN_R1
    default: LORAWAN_R1
  v3MessagePayloadFormatters:
    type: object
    properties:
      up_formatter:
        $ref: '#/definitions/v3PayloadFormatter'
        description: Payload formatter for uplink messages, must be set together with its parameter.
      up_formatter_parameter:
        type: string
        description: Parameter for the up_formatter, must be set together. The API enforces a maximum length of 64KB, but
          the size may be restricted further by deployment configuration.
      down_formatter:
        $ref: '#/definitions/v3PayloadFormatter'
        description: Payload formatter for downlink messages, must be set together with its parameter.
      down_formatter_parameter:
        type: string
        description: Parameter for the down_formatter, must be set together. The API enforces a maximum length of 64KB, but
          the size may be restricted further by deployment configuration.
  v3Minor:
    type: string
    enum:
    - MINOR_RFU_0
    - MINOR_1
    - MINOR_RFU_2
    - MINOR_RFU_3
    - MINOR_RFU_4
    - MINOR_RFU_5
    - MINOR_RFU_6
    - MINOR_RFU_7
    - MINOR_RFU_8
    - MINOR_RFU_9
    - MINOR_RFU_10
    - MINOR_RFU_11
    - MINOR_RFU_12
    - MINOR_RFU_13
    - MINOR_RFU_14
    - MINOR_RFU_15
    default: MINOR_RFU_0
  v3NetworkIdentifiers:
    type: object
    properties:
      net_id:
        type: string
        format: string
        example: '000013'
        description: LoRa Alliance NetID.
      ns_id:
        type: string
        format: string
        example: 70B3D57ED000ABCD
        description: LoRaWAN NSID (EUI-64) that uniquely identifies the Network Server instance.
      tenant_id:
        type: string
        description: Optional tenant identifier for multi-tenant deployments.
      cluster_id:
        type: string
        description: Cluster identifier of the Network Server.
      cluster_address:
        type: string
        description: Cluster address of the Network Server.
      tenant_address:
        type: string
        description: Optional tenant address for multi-tenant deployments.
    description: Identifies a Network Server.
  v3PHYVersion:
    type: string
    enum:
    - PHY_UNKNOWN
    - PHY_V1_0
    - TS001_V1_0
    - PHY_V1_0_1
    - TS001_V1_0_1
    - PHY_V1_0_2_REV_A
    - RP001_V1_0_2
    - PHY_V1_0_2_REV_B
    - RP001_V1_0_2_REV_B
    - PHY_V1_1_REV_A
    - RP001_V1_1_REV_A
    - PHY_V1_1_REV_B
    - RP001_V1_1_REV_B
    - PHY_V1_0_3_REV_A
    - RP001_V1_0_3_REV_A
    - RP002_V1_0_0
    - RP002_V1_0_1
    - RP002_V1_0_2
    - RP002_V1_0_3
    - RP002_V1_0_4
