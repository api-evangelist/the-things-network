      relay_configure_fwd_limit_req:
        $ref: '#/definitions/MACCommandRelayConfigureFwdLimitReq'
      relay_configure_fwd_limit_ans:
        $ref: '#/definitions/MACCommandRelayConfigureFwdLimitAns'
      relay_notify_new_end_device_req:
